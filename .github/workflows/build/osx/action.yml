name: Build
description: Build on OSX

inputs:
  threading:
    default: true
  freeTypeArchive:
    default: https://download.savannah.gnu.org/releases/freetype/freetype-2.12.1.tar.gz
  ftglRepo:
    default: https://github.com/disorderedmaterials/ftgl-2.4.0
  cacheOnly:
    type: boolean
    default: false
  qtVersion:
    type: string
    required: true
  antlrVersion:
    type: string
    required: true
  conanHash:
    type: string
    required: true

runs:
  using: "composite"
  steps:

  #
  # Setup / Install Dependencies
  #

  - name: Manage Homebrew Dependencies
    shell: bash
    run: |
      set -ex
      brew update-reset
      brew install gsl

  - name: Get ANTLR
    working-directory: ${{ runner.temp }}
    shell: bash
    run: |
      set -ex
      wget https://www.antlr.org/download/antlr-${{ inputs.antlrVersion }}-complete.jar -Oantlr-${{ inputs.antlrVersion }}-complete.jar

  - name: Install Python Dependencies
    shell: bash
    run: |
      pip3 install aqtinstall conan==1.* --break-system-packages

  - name: Retrieve Qt Cache
    id: cache-qt
    uses: actions/cache@v4
    with:
      key: osx-qt-${{ inputs.qtVersion }}
      path: ${{ runner.temp }}/qt

  - name: Install Qt
    if: ${{ steps.cache-qt.outputs.cache-hit != 'true' }}
    shell: bash
    run: |
      export PATH="$(python3 -m site --user-base)/bin:$PATH"
      aqt install-qt --outputdir ${{ runner.temp }}/qt mac desktop ${{ inputs.qtVersion }} -m all

  #
  # Build / Retrieve Freetype
  #

  - name: Retrieve FreeType Cache
    id: cache-freetype
    uses: actions/cache@v4
    with:
      key: osx-freetype
      path: |
        ${{ runner.temp }}/freetype-latest
        ${{ runner.temp }}/freetype-install

  - name: Download FreeType
    if: ${{ steps.cache-freetype.outputs.cache-hit != 'true' }}
    working-directory: ${{ runner.temp }}
    shell: bash
    run: |
      set -ex
      wget ${{ inputs.freeTypeArchive }} -Ofreetype.tgz
      tar -zxvf freetype.tgz
      rm freetype.tgz
      mv freetype-* freetype-latest

  - name: Build FreeType
    if: ${{ steps.cache-freetype.outputs.cache-hit != 'true' }}
    working-directory: ${{ runner.temp }}
    shell: bash
    run: |
      set -ex
      mkdir freetype-build && cd freetype-build
      cmake ../freetype-latest -G Ninja -DCMAKE_BUILD_TYPE:STRING="Release" -DBUILD_SHARED_LIBS:STRING=ON -DCMAKE_DISABLE_FIND_PACKAGE_HarfBuzz:bool=true -DCMAKE_DISABLE_FIND_PACKAGE_BZip2:bool=true -DCMAKE_DISABLE_FIND_PACKAGE_PNG:bool=true -DCMAKE_DISABLE_FIND_PACKAGE_ZLIB:bool=true -DCMAKE_DISABLE_FIND_PACKAGE_BrotliDec:bool=true -DCMAKE_INSTALL_PREFIX:path=../freetype-install -DBUILD_SHARED_LIBS:bool=OFF
      cmake --build . --target install --config Release

  #
  # Build / Retrieve FTGL
  #

  - name: Retrieve FTGL Cache
    id: cache-ftgl
    uses: actions/cache@v4
    with:
      key: osx-ftgl
      path: |
        ${{ runner.temp }}/ftgl-latest
        ${{ runner.temp }}/ftgl-install

  - name: Download FTGL
    if: ${{ steps.cache-ftgl.outputs.cache-hit != 'true' }}
    working-directory: ${{ runner.temp }}
    shell: bash
    run: |
      set -ex
      git clone ${{ inputs.ftglRepo }} ftgl-latest

  - name: Build FTGL
    if: ${{ steps.cache-ftgl.outputs.cache-hit != 'true' }}
    working-directory: ${{ runner.temp }}
    shell: bash
    run: |
      set -ex
      mkdir ftgl-build && cd ftgl-build
      INCLUDE="${RUNNER_TEMP}/freetype-latest;$INCLUDE"
      LIB="${RUNNER_TEMP}/freetype-install/lib;${RUNNER_TEMP}/freetype-install/bin;$LIB"
      export FREETYPE_DIR="${RUNNER_TEMP}/freetype-install"
      cmake ../ftgl-latest -G Ninja -DCMAKE_BUILD_TYPE:STRING="Release" -DCMAKE_INSTALL_PREFIX:path=../ftgl-install -DBUILD_SHARED_LIBS:bool=OFF
      cmake --build . --target install --config Release

  #
  # Main Build
  #

  - name: Retrieve Conan Cache
    id: cache-conan
    uses: actions/cache@v4
    with:
      key: osx-${{ runner.arch }}-conan-${{ inputs.conanHash }}
      path: |
        ~/.conan
        ~/.conancache

  - name: Build
    if: ${{ inputs.cacheOnly == 'false' }}
    shell: bash
    run: |
      set -ex
      git submodule update --init --recursive

      # Setup paths
      export PATH="$(python3 -m site --user-base)/bin:$PATH"
      Qt6_DIR=${{ runner.temp }}/qt/${{ inputs.qtVersion }}/macos/lib/cmake/Qt6
      QT_BASE_DIR=${{ runner.temp }}/qt/${{ inputs.qtVersion }}/macos
      export FTGL_DIR="${RUNNER_TEMP}/ftgl-install"

      # Find ANTLR4
      ANTLR_EXE="${{ runner.temp }}/antlr-${{ inputs.antlrVersion }}-complete.jar"
      echo "Detected ANTLR exe as [$ANTLR_EXE]"

      # Make sure we have a Java binary path - $JAVA_HOME_21_X64 does not appear to work on Silicon
      if [ "${JAVA_HOME_21_X64}" == "" ]
      then
        JAVA_RUNTIME=`which java`
      else
        JAVA_RUNTIME=${JAVA_HOME_21_X64}/bin/java
      fi
      echo "Java Runtime Executable: ${JAVA_RUNTIME}"

      # Set conan cache location
      conan config set storage.download_cache="${GITHUB_WORKSPACE}/.conancache"

      # Set minimum deployment target version
      export MACOSX_DEPLOYMENT_TARGET=13.3

      # Build
      mkdir build && cd build
      cmake -G Ninja -DGUI:bool=true -DMULTI_THREADING:bool=${{ inputs.threading }} -DCONAN_GSL="OFF" -DJava_JAVA_EXECUTABLE:path=${JAVA_RUNTIME} -DANTLR_EXECUTABLE:string=$ANTLR_EXE -DQT_BASE_DIR=$QT_BASE_DIR ../
      cmake --build . --config Release

      # Copy over gsl libs so we can ship them with the bundle. Our exe is only linked to two of the four libs present, and this breaks the binary if we don't include them all in the package.
      mkdir gsl
      cp -v $(brew --prefix gsl)/lib/*.dylib ./gsl

  - name: Upload Raw Build Artifacts
    if: ${{ inputs.cacheOnly == 'false' }}
    uses: actions/upload-artifact@v4
    with:
      name: osx-${{ runner.arch }}-build-artifacts
      path: |
        ${{ github.workspace }}/build
      retention-days: 1
