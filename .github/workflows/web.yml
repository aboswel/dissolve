name: Test Website Build

on:
  pull_request:
    branches:
    - '*'
    paths:
    - '.github/workflows/web**'
    - 'web/**'

  push:
    branches:
    - 'develop'
    - 'release/**'
    paths:
    - '.github/workflows/web**'
    - 'web/**'

jobs:

  BuildWeb:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup
      uses: "./.github/workflows/setup"
    - name: Build Website
      uses: "./.github/workflows/website"
      with:
        publishType: 'none'
